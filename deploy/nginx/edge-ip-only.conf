# ─────────────────────────────────────────────────────────────────────────────
#  Resort OS — TEMPORARY IP-only edge config (no domain/TLS yet)
#
#  edge.conf (the real one) routes by subdomain (app./apex) and terminates
#  TLS via Let's Encrypt — that needs a real domain pointed at this server.
#  Until one exists, this variant routes by PORT instead of hostname, on plain
#  HTTP, to the exact same 2 frontend containers (each of which already
#  proxies its own /api + /ws to `backend` internally — see
#  ../../frontend/nginx.spa.conf, nothing about that changes).
#
#  Used via: docker compose -f docker-compose.prod.yml -f docker-compose.prod.ip-only.yml up -d --build
#
#  SWITCH TO A REAL DOMAIN LATER: once a domain exists, just run the normal
#  `docker compose -f docker-compose.prod.yml up -d` (drop the ip-only
#  override) after completing DEPLOYMENT.md §7's certbot flow — no other
#  change needed, the frontend containers themselves are identical either way.
# ─────────────────────────────────────────────────────────────────────────────

# el-kheima (staff — POS/KDS/back office) — primary app, port 80
server {
    listen 80;
    server_name _;

    # Docker's embedded DNS — lazy resolution per-request (same pattern as
    # frontend/nginx.spa.conf) prevents "host not found in upstream" if nginx
    # starts before the upstream container is fully registered in Docker DNS.
    resolver 127.0.0.11 valid=30s;
    set $el_kheima_upstream el_kheima:80;
    set $public_site_upstream public_site:80;

    location / {
        proxy_pass http://$el_kheima_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade (KDS live updates) passthrough
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# public (guest booking/marketing site + QR ordering, unauthenticated) — port 8081
server {
    listen 8081;
    server_name _;

    resolver 127.0.0.11 valid=30s;
    set $public_site_upstream public_site:80;

    location / {
        proxy_pass http://$public_site_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
