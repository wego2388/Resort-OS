# ─────────────────────────────────────────────────────────────────────────────
#  Resort OS (El Kheima Beach) — public edge nginx
#
#  Mounted into the `nginx` service in docker-compose.prod.yml. Terminates
#  TLS and routes by subdomain to the matching frontend container (each of
#  which runs its own nginx serving its static build + proxying /api and /ws
#  to the backend — see frontend/nginx.spa.conf). This file only needs to
#  forward the whole request through; it does not need its own /api rules.
#
#  BEFORE FIRST DEPLOY — replace every `yourdomain.com` below with your real
#  domain, and see DEPLOYMENT.md §7 for the certbot flow that populates
#  /etc/letsencrypt (mounted read-only here as `certbot_certs`).
# ─────────────────────────────────────────────────────────────────────────────

# Shared ACME-challenge + HTTP→HTTPS redirect for all three hostnames.
server {
    listen 80;
    server_name app.yourdomain.com qr.yourdomain.com yourdomain.com www.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── app.yourdomain.com → el-kheima (staff) ───────────────────────────────────
server {
    listen 443 ssl;
    server_name app.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/app.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://el_kheima:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade (KDS) passthrough
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── qr.yourdomain.com → qr (guest QR ordering) ───────────────────────────────
server {
    listen 443 ssl;
    server_name qr.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/qr.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qr.yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://qr:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── yourdomain.com (apex) + www → public (guest booking site) ───────────────
server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://public_site:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
