# ─────────────────────────────────────────────────────────────────────────────
#  Resort OS — publicly trusted TLS while the deployment is addressed by IP.
#
#  Let's Encrypt IP certificates use the short-lived profile (about six days),
#  so automated renewal is mandatory.  The host Certbot process writes into
#  /etc/letsencrypt and /var/www/certbot; this container mounts both read-only.
#  See docker-compose.prod.ip-tls.yml and deploy/systemd/.
# ─────────────────────────────────────────────────────────────────────────────

# HTTP-01 challenge plus permanent redirect for the staff application.
server {
    listen 80;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

# Staff POS/KDS/back office.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/187.124.170.249/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/187.124.170.249/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:ResortTLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=604800" always;

    resolver 127.0.0.11 valid=30s;
    set $el_kheima_upstream el_kheima:80;

    location / {
        proxy_pass http://$el_kheima_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Preserve the old public-site port only as a redirect to its TLS port.
server {
    listen 8081;
    server_name _;

    location / {
        return 308 https://$host:8443$request_uri;
    }
}

# Public marketing/booking/QR application.
server {
    listen 8443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/187.124.170.249/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/187.124.170.249/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:ResortPublicTLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=604800" always;

    resolver 127.0.0.11 valid=30s;
    set $public_site_upstream public_site:80;

    location / {
        proxy_pass http://$public_site_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
