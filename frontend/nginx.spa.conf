# Shared nginx config baked into every frontend app image (el-kheima /
# public — see ../frontend/Dockerfile). Each app container:
#   1. serves its own built static assets with SPA fallback (Vue Router
#      history mode needs unknown paths to resolve to index.html), and
#   2. proxies /api and /ws straight through to the backend container over
#      the internal Docker network, so the app's relative-path axios client
#      (baseURL: '/api/v1', same as in local dev via the Vite proxy) works
#      unchanged in production — no per-environment API base URL needed.
#
# The public-facing edge nginx (see ../docker-compose.prod.yml +
# ../DEPLOYMENT.md) terminates TLS and reverse-proxies each subdomain to the
# matching app container on port 80; this file is what that container serves.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS (127.0.0.11). Using a variable in proxy_pass (rather
    # than a bare hostname) makes nginx resolve `backend` lazily, per-request,
    # instead of once at startup — a bare `proxy_pass http://backend:8005;`
    # would make this container refuse to start at all ("host not found in
    # upstream") any time it starts before the `backend` container's DNS entry
    # exists (e.g. this container restarting on its own, backend mid-deploy).
    resolver 127.0.0.11 valid=30s;
    set $backend_upstream backend:8005;

    # Backend API
    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (KDS live updates)
    location /ws/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Health passthrough (handy for debugging from inside the frontend container)
    location /health {
        proxy_pass http://$backend_upstream;
    }

    # Static assets — long cache, filenames are content-hashed by Vite
    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — anything else resolves to index.html so vue-router
    # (history mode) can take over client-side.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/xml+rss image/svg+xml;
}
