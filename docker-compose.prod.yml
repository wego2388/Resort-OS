# ─────────────────────────────────────────────────────────────────────────────
#  Resort OS (El Kheima Beach) — production stack
#
#  This is a NEW file for real VPS deployment — it does not replace or change
#  docker-compose.yml, which stays exactly as-is for local dev (Postgres +
#  Redis only, apps run natively via ./start.sh).
#
#  Routing decision (documented here + in DEPLOYMENT.md): SUBDOMAIN-based,
#  not path-based. Each frontend app assumes it's served from `/` (no vite
#  `base` config, no router base path), so giving each app its own subdomain
#  needs zero frontend code changes. Path-based routing (e.g. /app) would
#  require adding a `base` to each app's vite.config.ts and a matching
#  router base — out of scope here (frontend/app source isn't touched by this
#  deployment work).
#
#    app.<domain>    → el-kheima  (staff back office / POS / KDS / portal)
#    <domain> (apex) → public      (guest booking/marketing site + QR guest
#                                    ordering/beach-checkin/survey — apps/qr
#                                    was merged into apps/public 2026-07-06,
#                                    both were unauthenticated guest-facing
#                                    apps with no reason to be separate)
#
#  `nginx` is the single public-facing edge: it terminates TLS and reverse-
#  proxies each subdomain to the matching frontend container. Each frontend
#  container runs its OWN nginx (built by frontend/Dockerfile) that serves its
#  static dist/ AND proxies /api + /ws through to `backend` — see
#  frontend/nginx.spa.conf. `backend`, `celery_worker`, `celery_beat` all run
#  from the same image (backend/Dockerfile), just with different commands.
#
#  Build with:  docker compose -f docker-compose.prod.yml up -d --build
#  Self-contained — backend/ alone is the build context, no sibling checkout needed.
#
#  ⚠️  Explicit `name:` below is load-bearing, not cosmetic. Compose scopes
#  volumes/networks by *project name*, which defaults to the directory name
#  ("resort-os") if unset — identical to docker-compose.yml's default. Without
#  pinning a distinct name here, `docker compose -f docker-compose.prod.yml
#  down -v` (or even an unrelated `up`/`down` in the wrong file) would tear
#  down and recreate the SAME dev Postgres/Redis volumes docker-compose.yml
#  uses, silently wiping local dev data. Learned this the hard way while
#  verifying this file — see DEPLOYMENT.md's note and project memory.
# ─────────────────────────────────────────────────────────────────────────────

name: resort-os-prod

services:

  # ── Infrastructure (same images/healthchecks as docker-compose.yml) ─────────
  db_postgres:
    image: postgres:16
    restart: unless-stopped
    # Not published to the host's public interface in prod — only reachable
    # by other containers on the compose network. Change to 5436:5432 (or
    # drop the 127.0.0.1 prefix) only if you deliberately need host access.
    ports: ["127.0.0.1:5436:5432"]
    environment:
      POSTGRES_DB: resort_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resort_dev_pass}
    volumes: ["resort_pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis_cache:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["127.0.0.1:6381:6379"]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: ["resort_redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env.prod
    # RATE_LIMIT_TRUSTED_PROXY_HOPS معرّف هنا صراحةً (مش جوه .env.prod
    # المتجاهَل من git) — حقيقة بنية النشر (public client -> edge nginx ->
    # frontend nginx -> backend، حتى في overlay الـip-only)، مش سر. القيمة
    # هنا بتغلب أي قيمة في .env.prod لنفس المتغيّر (Compose environment:
    # بتفوز على env_file:). راجع backend/app/core/rate_limit.py.
    environment:
      RATE_LIMIT_TRUSTED_PROXY_HOPS: "2"
    ports: ["127.0.0.1:8005:8005"]
    depends_on:
      db_postgres:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:8005/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env.prod
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    # Overrides the backend image's inherited HEALTHCHECK (curl :8005/health) —
    # a worker never opens that port (it runs `celery worker`, not uvicorn), so
    # without this override the container always shows "unhealthy" regardless
    # of whether the worker is actually fine. `inspect ping` is the real check.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    depends_on:
      db_postgres:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      backend:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env.prod
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
    # Same inherited-HEALTHCHECK problem as celery_worker above, but beat has
    # no equivalent to `inspect ping` (it's a scheduler, not a worker) — the
    # simplest correct check is that the process is actually running. No
    # `ps`/`pgrep` in this slim image, so grep /proc/*/cmdline directly
    # (both `grep` and `/proc` are always available).
    healthcheck:
      test: ["CMD-SHELL", "grep -l beat /proc/[0-9]*/cmdline >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    depends_on:
      db_postgres:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ── Frontend apps (each is a self-contained nginx serving its own dist/) ────
  el_kheima:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: el-kheima
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  public_site:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: public
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ── Edge reverse proxy (TLS termination + subdomain routing) ────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - el_kheima
      - public_site
      - backend

volumes:
  resort_pgdata:
  resort_redisdata:
  certbot_www:
  certbot_certs:
